# Lighttpd Configuration for QGIS Server

server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_fastcgi",
    "mod_setenv"
)

server.document-root = "/var/www"
server.port = env.LIGHTTPD_PORT
server.username = "www-data"
server.groupname = "www-data"
server.errorlog = "/dev/stderr"
accesslog.filename = "/dev/stdout"

# MIME types
mimetype.assign = (
    ".html" => "text/html",
    ".xml" => "application/xml",
    ".json" => "application/json",
    ".png" => "image/png",
    ".jpg" => "image/jpeg",
    ".gif" => "image/gif"
)

# FastCGI backend configuration
fastcgi.server = (
    "/" => ((
        "host" => env.LIGHTTPD_FASTCGI_HOST,
        "port" => env.LIGHTTPD_FASTCGI_PORT,
        "check-local" => "disable"
    ))
)
