name: Build and Push Multi-Arch Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Rebuild weekly on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER: docker.io
  IMAGE_NAME_GHCR: walkthru-earth/qgis-server
  IMAGE_NAME_DOCKER: walkthruearth/qgis-server

permissions:
  contents: read
  packages: write

jobs:
  # Build AMD64 using official packages (fast)
  build-amd64:
    name: Build AMD64 (Official Packages)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            suffix: ''
          - target: server-debug
            suffix: '-debug'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.suffix }}-amd64
            type=ref,event=pr,suffix=${{ matrix.suffix }}-amd64
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}-amd64
            type=raw,value=latest,enable={{is_default_branch}},suffix=${{ matrix.suffix }}-amd64
          flavor: |
            latest=false

      - name: Build and push AMD64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-amd64
          provenance: true
          sbom: true

  # Build ARM64 from source (slow, needs more time)
  build-arm64:
    name: Build ARM64 (From Source)
    runs-on: ubuntu-24.04
    timeout-minutes: 180  # 3 hours for compilation

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server
            suffix: ''
          - target: server-debug
            suffix: '-debug'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          docker system prune -af

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=ref,event=branch,suffix=${{ matrix.suffix }}-arm64
            type=ref,event=pr,suffix=${{ matrix.suffix }}-arm64
            type=semver,pattern={{version}},suffix=${{ matrix.suffix }}-arm64
            type=raw,value=latest,enable={{is_default_branch}},suffix=${{ matrix.suffix }}-arm64
          flavor: |
            latest=false

      - name: Build and push ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.arm64
          platforms: linux/arm64
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-arm64
          provenance: true
          sbom: true

  # Create multi-arch manifest after both builds complete
  create-manifest:
    name: Create Multi-Arch Manifest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - suffix: ''
          - suffix: '-debug'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push GHCR manifest
        run: |
          TAG="${{ steps.tag.outputs.tag }}${{ matrix.suffix }}"
          docker manifest create ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TAG} \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TAG}-amd64 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TAG}-arm64
          docker manifest push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${TAG}

      - name: Create and push Docker Hub manifest
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          TAG="${{ steps.tag.outputs.tag }}${{ matrix.suffix }}"
          docker manifest create ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${TAG} \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${TAG}-amd64 \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${TAG}-arm64
          docker manifest push ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${TAG}

      - name: Create latest manifest (GHCR)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          SUFFIX="${{ matrix.suffix }}"
          docker manifest create ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest${SUFFIX} \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }}${SUFFIX}-amd64 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }}${SUFFIX}-arm64
          docker manifest push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest${SUFFIX}

      - name: Create latest manifest (Docker Hub)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.DOCKERHUB_USERNAME != ''
        run: |
          SUFFIX="${{ matrix.suffix }}"
          docker manifest create ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:latest${SUFFIX} \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }}${SUFFIX}-amd64 \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }}${SUFFIX}-arm64
          docker manifest push ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:latest${SUFFIX}

  # Test images after manifest creation
  test:
    name: Test Images
    needs: create-manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test AMD64 server image
        run: |
          docker run --rm -d --name qgis-test \
            -p 8080:8080 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }}

          # Wait for server to start
          sleep 15

          # Test WMS capabilities (expect 500 without project file)
          curl -s "http://localhost:8080/ows?SERVICE=WMS&REQUEST=GetCapabilities" | grep -q "ServerException" && echo "QGIS Server responding correctly"

          # Test landing page
          curl -f "http://localhost:8080/" || exit 1

          # Cleanup
          docker stop qgis-test
