name: Build and Push Multi-Arch Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER: docker.io
  IMAGE_NAME_GHCR: walkthru-earth/qgis-server
  IMAGE_NAME_DOCKER: walkthruearth/qgis-server
  # Shared pre-runner script for Hetzner Cloud runners
  HCLOUD_PRE_RUNNER_SCRIPT: |
    apt-get update
    apt-get install -y ca-certificates curl
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
    apt-get update
    apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # AMD64 Build - Using Hetzner Cloud x86 Server
  # =============================================================================
  create-runner-amd64:
    name: Create AMD64 Runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-runner.outputs.label }}
      server_id: ${{ steps.create-runner.outputs.server_id }}
    steps:
      - name: Create Hetzner Cloud runner
        id: create-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: qgis-ccx33-amd64-${{ github.run_id }}
          server_type: ccx33  # 8 dedicated x86 cores, 32GB RAM, 240GB SSD
          location: nbg1
          image: ubuntu-24.04
          pre_runner_script: ${{ env.HCLOUD_PRE_RUNNER_SCRIPT }}

  build-amd64:
    name: Build AMD64
    needs: create-runner-amd64
    runs-on: ${{ needs.create-runner-amd64.outputs.label }}
    timeout-minutes: 300
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AMD64 by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,"name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }},${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}",push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:cache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:cache-amd64,mode=max,image-manifest=true
          provenance: false
          sbom: false

  delete-runner-amd64:
    name: Delete AMD64 Runner
    needs:
      - create-runner-amd64
      - build-amd64
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete Hetzner Cloud runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner-amd64.outputs.label }}
          server_id: ${{ needs.create-runner-amd64.outputs.server_id }}

  # =============================================================================
  # ARM64 Build - Using Hetzner Cloud Native ARM Server (Ampere Altra)
  # =============================================================================
  create-runner-arm64:
    name: Create ARM64 Runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-runner.outputs.label }}
      server_id: ${{ steps.create-runner.outputs.server_id }}
    steps:
      - name: Create Hetzner Cloud runner
        id: create-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: qgis-cax41-arm64-${{ github.run_id }}
          server_type: cax41  # 16 ARM cores (Ampere Altra), 32GB RAM, 320GB SSD
          location: fsn1  # Falkenstein
          image: ubuntu-24.04
          pre_runner_script: ${{ env.HCLOUD_PRE_RUNNER_SCRIPT }}

  build-arm64:
    name: Build ARM64 (Native)
    needs: create-runner-arm64
    runs-on: ${{ needs.create-runner-arm64.outputs.label }}
    timeout-minutes: 300
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,"name=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }},${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}",push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:cache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:cache-arm64,mode=max,image-manifest=true
          provenance: false
          sbom: false

  delete-runner-arm64:
    name: Delete ARM64 Runner
    needs:
      - create-runner-arm64
      - build-arm64
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete Hetzner Cloud runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner-arm64.outputs.label }}
          server_id: ${{ needs.create-runner-arm64.outputs.server_id }}

  # =============================================================================
  # Create Multi-Arch Manifest (push-by-digest merge)
  # =============================================================================
  create-manifest:
    name: Create Multi-Arch Manifest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi-arch manifest and push
        run: |
          # Build the tag arguments for imagetools create
          TAGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS+=("--tag" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"

          docker buildx imagetools create "${TAGS[@]}" \
            "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}@${{ needs.build-amd64.outputs.digest }}" \
            "${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}@${{ needs.build-arm64.outputs.digest }}"

  # =============================================================================
  # Test Images
  # =============================================================================
  test:
    name: Test Images
    needs: create-manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test with main project (WMS + WFS + raster)
        run: |
          docker run --rm -d --name qgis-test \
            -p 8080:8080 \
            -v ${{ github.workspace }}/tests/data:/etc/qgisserver:ro \
            -e QGIS_PROJECT_FILE=/etc/qgisserver/test_project.qgs \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest

          sleep 15

          # WMS GetCapabilities — should return valid capabilities XML
          curl -sf "http://localhost:8080/ows?SERVICE=WMS&REQUEST=GetCapabilities" | grep -q "WMS_Capabilities" && echo "WMS GetCapabilities OK"

          # WMS GetMap — request a raster map image (landsat layer, extent ~17.9,30.1,18.1,30.3 in EPSG:4326)
          GETMAP_RESP=$(curl -s -w "\n%{http_code}" "http://localhost:8080/ows?SERVICE=WMS&REQUEST=GetMap&LAYERS=landsat&CRS=EPSG:4326&BBOX=30.15,17.92,30.26,18.05&WIDTH=256&HEIGHT=256&FORMAT=image/png&VERSION=1.3.0")
          HTTP_CODE=$(echo "$GETMAP_RESP" | tail -1)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "WMS GetMap (raster) OK"
          else
            echo "WMS GetMap failed with HTTP $HTTP_CODE"
            echo "Response body:"
            echo "$GETMAP_RESP" | head -20
            echo "Container logs:"
            docker logs qgis-test 2>&1 | tail -20
            exit 1
          fi

          # WFS GetCapabilities
          curl -sf "http://localhost:8080/ows?SERVICE=WFS&REQUEST=GetCapabilities" | grep -q "WFS_Capabilities" && echo "WFS GetCapabilities OK"

          # WFS GetFeature — request vector features
          curl -sf "http://localhost:8080/ows?SERVICE=WFS&REQUEST=GetFeature&TYPENAME=testlayer&MAXFEATURES=1" | grep -q "testlayer" && echo "WFS GetFeature OK"

          docker stop qgis-test

      - name: Test GDAL GeoParquet driver
        run: |
          docker run --rm ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest \
            ogrinfo --formats | grep -q "Parquet" && echo "GeoParquet driver OK" || { echo "GeoParquet driver NOT loaded"; exit 1; }

      - name: Test qgis_process and PyQGIS bindings
        run: |
          # Test qgis_process lists algorithms (native + processing)
          ALGO_COUNT=$(docker run --rm -e QT_QPA_PLATFORM=offscreen \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest \
            qgis_process list 2>&1 | grep -c 'native:')
          echo "Available native algorithms: $ALGO_COUNT"
          [ "$ALGO_COUNT" -gt 100 ] && echo "qgis_process OK" || { echo "Too few algorithms: $ALGO_COUNT"; exit 1; }

          # Test PyQGIS Python imports
          docker run --rm -e QT_QPA_PLATFORM=offscreen \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest \
            python3 -c "from qgis.core import QgsApplication; print('PyQGIS OK')"

      - name: Test with WFS-only project
        run: |
          docker run --rm -d --name qgis-test-wfs \
            -p 8081:8080 \
            -v ${{ github.workspace }}/tests/data:/etc/qgisserver:ro \
            -e QGIS_PROJECT_FILE=/etc/qgisserver/test_project_wfs.qgs \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest

          sleep 15

          # WFS GetCapabilities
          curl -sf "http://localhost:8081/ows?SERVICE=WFS&REQUEST=GetCapabilities" | grep -q "WFS_Capabilities" && echo "WFS-only project: GetCapabilities OK"

          # WFS GetFeature
          curl -sf "http://localhost:8081/ows?SERVICE=WFS&REQUEST=GetFeature&TYPENAME=testlayer&MAXFEATURES=1" | grep -q "testlayer" && echo "WFS-only project: GetFeature OK"

          docker stop qgis-test-wfs

  # =============================================================================
  # Cleanup old untagged versions (runs even if tests fail)
  # =============================================================================
  cleanup:
    name: Cleanup Old Versions
    needs: [create-manifest, test]
    if: ${{ always() && needs.create-manifest.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete old untagged GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: qgis-server
          package-type: container
          min-versions-to-keep: 2
          delete-only-untagged-versions: true

      - name: Delete old untagged Docker Hub tags
        if: vars.DOCKERHUB_USERNAME != ''
        run: |
          # Get auth token
          TOKEN=$(curl -sf "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ vars.DOCKERHUB_USERNAME }}","password":"${{ secrets.DOCKERHUB_TOKEN }}"}' \
            | jq -r '.token')

          # List all tags
          TAGS=$(curl -sf "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME_DOCKER }}/tags?page_size=100" \
            -H "Authorization: Bearer ${TOKEN}" \
            | jq -r '.results[].name')

          # Delete tags that look like sha256 digests (untagged manifests)
          for TAG in $TAGS; do
            if [[ "$TAG" =~ ^sha- ]]; then
              echo "Deleting Docker Hub tag: $TAG"
              curl -sf -X DELETE \
                "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME_DOCKER }}/tags/${TAG}/" \
                -H "Authorization: Bearer ${TOKEN}" || true
            fi
          done
          echo "Docker Hub cleanup complete"
