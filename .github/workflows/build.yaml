name: Build and Push Multi-Arch Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Rebuild weekly on Sunday at 2:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER: docker.io
  IMAGE_NAME_GHCR: walkthru-earth/qgis-server
  IMAGE_NAME_DOCKER: walkthruearth/qgis-server

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # AMD64 Build - Using Hetzner Cloud x86 Server
  # =============================================================================
  create-runner-amd64:
    name: Create AMD64 Runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-runner.outputs.label }}
      server_id: ${{ steps.create-runner.outputs.server_id }}
    steps:
      - name: Create Hetzner Cloud runner
        id: create-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: ccx33  # 8 dedicated x86 cores, 32GB RAM, 240GB SSD
          location: nbg1
          image: ubuntu-24.04
          pre_runner_script: |
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  build-amd64:
    name: Build AMD64
    needs: create-runner-amd64
    runs-on: ${{ needs.create-runner-amd64.outputs.label }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=raw,value=build-amd64
          flavor: |
            latest=false

      - name: Build and push AMD64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server-amd64
          cache-to: type=gha,mode=max,scope=server-amd64
          provenance: true
          sbom: true

  delete-runner-amd64:
    name: Delete AMD64 Runner
    needs:
      - create-runner-amd64
      - build-amd64
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete Hetzner Cloud runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner-amd64.outputs.label }}
          server_id: ${{ needs.create-runner-amd64.outputs.server_id }}

  # =============================================================================
  # ARM64 Build - Using Hetzner Cloud Native ARM Server (Ampere Altra)
  # =============================================================================
  create-runner-arm64:
    name: Create ARM64 Runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.create-runner.outputs.label }}
      server_id: ${{ steps.create-runner.outputs.server_id }}
    steps:
      - name: Create Hetzner Cloud runner
        id: create-runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: create
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          server_type: cax41  # 16 ARM cores (Ampere Altra), 32GB RAM, 320GB SSD
          location: nbg1
          image: ubuntu-24.04
          pre_runner_script: |
            apt-get update
            apt-get install -y ca-certificates curl
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  build-arm64:
    name: Build ARM64 (Native)
    needs: create-runner-arm64
    runs-on: ${{ needs.create-runner-arm64.outputs.label }}
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=raw,value=build-arm64
          flavor: |
            latest=false

      - name: Build and push ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server-arm64
          cache-to: type=gha,mode=max,scope=server-arm64
          provenance: true
          sbom: true

  delete-runner-arm64:
    name: Delete ARM64 Runner
    needs:
      - create-runner-arm64
      - build-arm64
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Delete Hetzner Cloud runner
        uses: Cyclenerd/hcloud-github-runner@v1
        with:
          mode: delete
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          name: ${{ needs.create-runner-arm64.outputs.label }}
          server_id: ${{ needs.create-runner-arm64.outputs.server_id }}

  # =============================================================================
  # Create Multi-Arch Manifest
  # =============================================================================
  create-manifest:
    name: Create Multi-Arch Manifest
    needs: [build-amd64, build-arm64]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create version manifest (GHCR)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          docker manifest create ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${VERSION} \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:build-amd64 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:build-arm64
          docker manifest push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:${VERSION}

      - name: Create version manifest (Docker Hub)
        if: startsWith(github.ref, 'refs/tags/') && vars.DOCKERHUB_USERNAME != ''
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          docker manifest create ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${VERSION} \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:build-amd64 \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:build-arm64
          docker manifest push ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:${VERSION}

      - name: Create latest manifest (GHCR)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker manifest create ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:build-amd64 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:build-arm64
          docker manifest push ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest

      - name: Create latest manifest (Docker Hub)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.DOCKERHUB_USERNAME != ''
        run: |
          docker manifest create ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:latest \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:build-amd64 \
            ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:build-arm64
          docker manifest push ${{ env.REGISTRY_DOCKER }}/${{ env.IMAGE_NAME_DOCKER }}:latest

  # =============================================================================
  # Test Images
  # =============================================================================
  test:
    name: Test Images
    needs: create-manifest
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test AMD64 server image
        run: |
          docker run --rm -d --name qgis-test \
            -p 8080:8080 \
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}:latest

          # Wait for server to start
          sleep 15

          # Test WMS capabilities (expect 500 without project file)
          curl -s "http://localhost:8080/ows?SERVICE=WMS&REQUEST=GetCapabilities" | grep -q "ServerException" && echo "QGIS Server responding correctly"

          # Test landing page
          curl -f "http://localhost:8080/" || exit 1

          # Cleanup
          docker stop qgis-test
